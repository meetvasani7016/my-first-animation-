<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        .container {
            /* margin-top: 180px; */
            place-content: center;
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 2px;
            perspective: 700px;
            height: 100vh;

        }

        .box {
            display: grid;
            border: 2px solid black;
        }

        .first {
            animation: box 3s infinite 0.5s linear;
            display: grid;
            grid-template-columns: auto auto auto;
                }

        @keyframes box {
            from {
                background-color: white;
                transform: rotatey(0deg);
            }

            to {
                background-color: blue;
                transform: rotatey(180deg);
            }
        }

        @keyframes first {}
    </style>
</head>

<body>
    <div class="container">
        <div class="first">
            <div class="box ">1</div>
            <div class="box ">2</div>
            <div class="box ">3</div>
        </div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
        <div class="box">9</div>
    </div>
</body>

</html>
